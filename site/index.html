<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>NeetCode Habit Streak</title>
<style>
  :root {
    --bg: #0d1117;
    --panel: #161b22;
    --border: #30363d;
    --text: #e6edf3;
    --muted: #8b949e;
    --accent: #2f81f7;
    --l0: #161b22;
    --l1: #0e4429;
    --l2: #006d32;
    --l3: #26a641;
    --l4: #39d353;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    -webkit-font-smoothing: antialiased;
  }
  .wrap { max-width: 960px; margin: 0 auto; padding: 48px 20px 64px; }
  header h1 { font-size: 28px; margin: 0 0 4px; }
  header p { color: var(--muted); margin: 0 0 32px; font-size: 15px; }
  header a { color: var(--accent); text-decoration: none; }
  header a:hover { text-decoration: underline; }

  .stats { display: flex; flex-wrap: wrap; gap: 16px; margin-bottom: 32px; }
  .stat {
    flex: 1 1 160px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 18px 20px;
  }
  .stat .num { font-size: 30px; font-weight: 700; line-height: 1; }
  .stat .num .unit { font-size: 15px; font-weight: 500; color: var(--muted); margin-left: 4px; }
  .stat .label { color: var(--muted); font-size: 13px; margin-top: 8px; text-transform: uppercase; letter-spacing: .04em; }

  .card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 20px;
    overflow-x: auto;
  }
  .card h2 { font-size: 15px; font-weight: 600; margin: 0 0 16px; color: var(--muted); }

  .heatmap { display: inline-grid; grid-auto-flow: column; grid-template-rows: repeat(7, 13px); gap: 3px; }
  .cell { width: 13px; height: 13px; border-radius: 3px; background: var(--l0); outline: 1px solid rgba(255,255,255,0.02); outline-offset: -1px; }
  .cell.l1 { background: var(--l1); }
  .cell.l2 { background: var(--l2); }
  .cell.l3 { background: var(--l3); }
  .cell.l4 { background: var(--l4); }
  .cell:hover { outline: 1px solid var(--text); }

  .legend { display: flex; align-items: center; justify-content: flex-end; gap: 6px; margin-top: 14px; color: var(--muted); font-size: 12px; }
  .legend .cell { width: 11px; height: 11px; }

  footer { color: var(--muted); font-size: 13px; margin-top: 32px; text-align: center; }

  #tooltip {
    position: fixed;
    pointer-events: none;
    background: #1c2128;
    border: 1px solid var(--border);
    color: var(--text);
    padding: 6px 9px;
    border-radius: 6px;
    font-size: 12px;
    white-space: nowrap;
    opacity: 0;
    transform: translate(-50%, -100%);
    transition: opacity .08s;
    z-index: 10;
  }
</style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1>🔥 NeetCode Habit Streak</h1>
      <p>Daily problem-solving activity from
        <a href="https://github.com/saitarrun/neetcode-submissions">saitarrun/neetcode-submissions</a>.</p>
    </header>

    <div class="stats">
      <div class="stat"><div class="num" id="stat-current">0<span class="unit">days</span></div><div class="label">Current Streak</div></div>
      <div class="stat"><div class="num" id="stat-longest">0<span class="unit">days</span></div><div class="label">Longest Streak</div></div>
      <div class="stat"><div class="num" id="stat-total">0</div><div class="label">Total Submissions</div></div>
      <div class="stat"><div class="num" id="stat-active">0<span class="unit">days</span></div><div class="label">Active Days</div></div>
    </div>

    <div class="card">
      <h2 id="heatmap-title">Submission activity</h2>
      <div class="heatmap" id="heatmap"></div>
      <div class="legend">
        Less
        <span class="cell"></span>
        <span class="cell l1"></span>
        <span class="cell l2"></span>
        <span class="cell l3"></span>
        <span class="cell l4"></span>
        More
      </div>
    </div>

    <footer id="footer">Keep the streak alive. One problem a day.</footer>
  </div>

  <div id="tooltip"></div>

  <script>
    // Fallback data (used only if data.json can't be loaded). The deployed
    // data.json is regenerated from git history on every push to main.
    const FALLBACK = {
      "2026-06-01": 11,
      "2026-06-02": 5,
      "2026-06-04": 10,
      "2026-06-17": 1,
      "2026-06-18": 4,
      "2026-06-21": 1
    };

    const DAY = 86400000;
    const fmt = (d) => d.toISOString().slice(0, 10);
    const parse = (s) => { const [y, m, dd] = s.split("-").map(Number); return new Date(Date.UTC(y, m - 1, dd)); };
    const pretty = (s) => parse(s).toLocaleDateString(undefined, { weekday: "short", year: "numeric", month: "short", day: "numeric", timeZone: "UTC" });

    function level(c) {
      if (!c) return 0;
      if (c >= 8) return 4;
      if (c >= 4) return 3;
      if (c >= 2) return 2;
      return 1;
    }

    function longestStreak(days) {
      if (!days.length) return 0;
      let best = 1, run = 1;
      for (let i = 1; i < days.length; i++) {
        const gap = (parse(days[i]) - parse(days[i - 1])) / DAY;
        run = gap === 1 ? run + 1 : 1;
        best = Math.max(best, run);
      }
      return best;
    }

    function currentStreak(days) {
      if (!days.length) return 0;
      const set = new Set(days);
      const todayKey = fmt(new Date());
      const last = days[days.length - 1];
      // Streak is "current" only if the latest activity is today or yesterday.
      const gapFromToday = (parse(todayKey) - parse(last)) / DAY;
      if (gapFromToday > 1) return 0;
      let cur = parse(last), streak = 0;
      while (set.has(fmt(cur))) { streak++; cur = new Date(cur - DAY); }
      return streak;
    }

    function render(DATA) {
      const days = Object.keys(DATA).sort();
      const total = days.reduce((s, d) => s + DATA[d], 0);

      document.getElementById("stat-current").firstChild.textContent = currentStreak(days);
      document.getElementById("stat-longest").firstChild.textContent = longestStreak(days);
      document.getElementById("stat-total").textContent = total;
      document.getElementById("stat-active").firstChild.textContent = days.length;
      document.getElementById("heatmap-title").textContent =
        `${total} submission${total === 1 ? "" : "s"} in the last year`;

      const today = parse(fmt(new Date()));
      const start = new Date(today - 364 * DAY);
      const gridStart = new Date(start - start.getUTCDay() * DAY);

      const grid = document.getElementById("heatmap");
      grid.innerHTML = "";
      const tip = document.getElementById("tooltip");

      for (let t = gridStart.getTime(); t <= today.getTime(); t += DAY) {
        const key = fmt(new Date(t));
        const count = DATA[key] || 0;
        const cell = document.createElement("div");
        cell.className = "cell" + (level(count) ? " l" + level(count) : "");
        cell.dataset.label = `${count} submission${count === 1 ? "" : "s"} on ${pretty(key)}`;
        cell.addEventListener("mousemove", (e) => {
          tip.textContent = cell.dataset.label;
          tip.style.left = e.clientX + "px";
          tip.style.top = (e.clientY - 12) + "px";
          tip.style.opacity = "1";
        });
        cell.addEventListener("mouseleave", () => { tip.style.opacity = "0"; });
        grid.appendChild(cell);
      }
    }

    // Load the generated data, fall back to the embedded snapshot.
    fetch("./data.json", { cache: "no-store" })
      .then((r) => { if (!r.ok) throw new Error(r.status); return r.json(); })
      .then((data) => render(data && Object.keys(data).length ? data : FALLBACK))
      .catch(() => render(FALLBACK));
  </script>
</body>
</html>
