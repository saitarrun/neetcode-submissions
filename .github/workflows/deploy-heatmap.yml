name: Deploy habit streak heatmap

# Rebuild and redeploy the heatmap on every submission (push to main).
on:
  push:
    branches: [main]
    # Ignore the bot's own SVG commit so it doesn't re-trigger this workflow.
    paths-ignore:
      - "assets/streak.svg"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: heatmap-pages
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build data.json + README badge (assets/streak.svg)
        run: |
          set -euo pipefail
          python3 scripts/build_streak.py
          mkdir -p public
          cp site/index.html public/index.html
          cp assets/streak.svg public/streak.svg
          echo "Generated data.json:"
          cat public/data.json

      - name: Commit updated badge to main
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/streak.svg
          if git diff --cached --quiet; then
            echo "Badge unchanged; nothing to commit."
          else
            git commit -m "chore: update streak badge [skip ci]"
            git push origin HEAD:main
          fi

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          publish_branch: gh-pages
          force_orphan: true
