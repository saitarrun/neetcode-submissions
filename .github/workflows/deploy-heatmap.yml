name: Deploy habit streak heatmap

# Rebuild and redeploy the heatmap on every submission (push to main).
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: heatmap-pages
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build site
        run: |
          set -euo pipefail
          mkdir -p public
          cp site/index.html public/index.html

          # Per-day submission counts derived from commit history.
          # "Add: ..." counts as 1; "Bulk sync: N submissions" counts as N;
          # other commits (repo init, this workflow, etc.) count as 0.
          DAYS=$(git log --pretty=format:'%ad%x09%s' --date=short \
            | awk -F'\t' '{
                date=$1; s=$2; w=0;
                if (s ~ /^Bulk sync: [0-9]+ submissions/) {
                  n=s; sub(/^Bulk sync: /,"",n); sub(/ submissions.*/,"",n); w=n+0;
                } else if (s ~ /^Add:/) { w=1; }
                sum[date]+=w;
              } END { for (d in sum) if (sum[d]>0) print sum[d], d }' \
            | sort -k2 \
            | jq -Rn '[inputs
                | capture("(?<c>[0-9]+)\\s+(?<d>[0-9-]+)")
                | {(.d): (.c | tonumber)}] | add // {}')

          # Problems solved = number of distinct problem folders.
          PROBLEMS=$(find "Data Structures & Algorithms" -mindepth 1 -maxdepth 1 -type d | wc -l | tr -d ' ')

          jq -n --argjson days "$DAYS" --argjson problems "$PROBLEMS" \
            '{days: $days, problemsSolved: $problems}' > public/data.json

          echo "Generated data.json:"
          cat public/data.json

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          publish_branch: gh-pages
          force_orphan: true
